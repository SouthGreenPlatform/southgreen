name: Deploy to Apache server

on:
  push:
    branches: [main]

jobs:
  build-deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install & Build
        run: |
          npm ci
          npm run build

      - name: Deploy
        run: |
          rsync -avzr --delete dist/ /var/www/southgreen/
